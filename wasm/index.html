<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪩</text></svg>">
  <title>Monte Carlo Path Tracer & Photon Mapping Browser Demo</title>
  <link rel="stylesheet" href="/wasm/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Monte Carlo Path Tracer & Photon Mapping WASM Demo</h1>
      <p>Edit the scene on the left and render it in the browser on the right. Made by <a href="https://www.nathaniellamjohnson.com/"> Nathaniel Lam Johnson</a>, Conner Nguyen, and Christian Perez.</p>
    </div>
    <button id="render-btn" type="button">Render</button>
  </header>

  <main class="layout">
    <section class="panel editor-panel">
      <label for="scene-input">Scene</label>
      <textarea id="scene-input" spellcheck="false"></textarea>
      <div id="status" class="status">
        <span id="status-spinner" class="spinner hidden" aria-hidden="true"></span>
        <span id="status-text">Loading wasm module...</span>
      </div>
    </section>

    <section class="panel output-panel">
      <label for="output-canvas">Rendered Output</label>
      <div class="canvas-shell">
        <canvas id="output-canvas"></canvas>
      </div>
    </section>
  </main>

  <script src="/wasm/ray_tracer.js"></script>
  <script src="/wasm/app.js"></script>
</body>
</html>
